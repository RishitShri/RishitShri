<svg width="820" height="280" viewBox="0 0 820 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b29"/>
    </linearGradient>
    <radialGradient id="nodeGlow">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#26314a"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00f7ff"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#facc15"/>
    </marker>
  </defs>

  <rect width="820" height="280" rx="16" fill="url(#bgGrad)"/>
  <rect width="820" height="280" rx="16" fill="url(#grid)"/>

  <text x="410" y="30" text-anchor="middle" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#00f7ff">
    Agentic AI · Multi-Agent Orchestration
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="410" y="48" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#7d8590">
    Task Routing  •  Tool Calling  •  Memory Retrieval  •  Live Decisioning
  </text>

  <!-- outbound (task) + inbound (result) curved connectors -->
  <g stroke-width="2" fill="none">
    <!-- Research Agent -->
    <path d="M410,165 Q280,95 150,100" stroke="#00f7ff" stroke-dasharray="5,6" opacity="0.7" marker-end="url(#arrowCyan)">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <path d="M150,100 Q280,140 410,165" stroke="#facc15" stroke-dasharray="5,6" opacity="0.55" marker-end="url(#arrowGold)">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.4s" repeatCount="indefinite"/>
    </path>

    <!-- Tool Agent -->
    <path d="M410,165 Q280,215 150,230" stroke="#00f7ff" stroke-dasharray="5,6" opacity="0.7" marker-end="url(#arrowCyan)">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.3s" repeatCount="indefinite"/>
    </path>
    <path d="M150,230 Q280,190 410,165" stroke="#facc15" stroke-dasharray="5,6" opacity="0.55" marker-end="url(#arrowGold)">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.6s" repeatCount="indefinite"/>
    </path>

    <!-- Planning Agent -->
    <path d="M410,165 Q540,95 670,100" stroke="#00f7ff" stroke-dasharray="5,6" opacity="0.7" marker-end="url(#arrowCyan)">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M670,100 Q540,140 410,165" stroke="#facc15" stroke-dasharray="5,6" opacity="0.55" marker-end="url(#arrowGold)">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.5s" repeatCount="indefinite"/>
    </path>

    <!-- Memory Agent -->
    <path d="M410,165 Q540,215 670,230" stroke="#00f7ff" stroke-dasharray="5,6" opacity="0.7" marker-end="url(#arrowCyan)">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M670,230 Q540,190 410,165" stroke="#facc15" stroke-dasharray="5,6" opacity="0.55" marker-end="url(#arrowGold)">
      <animate attributeName="stroke-dashoffset" from="0" to="-22" dur="1.7s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- traveling packets -->
  <circle r="3.2" fill="#00f7ff"><animateMotion path="M410,165 Q280,95 150,100" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle r="3.2" fill="#facc15"><animateMotion path="M150,100 Q280,140 410,165" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle r="3.2" fill="#00f7ff"><animateMotion path="M410,165 Q280,215 150,230" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle r="3.2" fill="#facc15"><animateMotion path="M150,230 Q280,190 410,165" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle r="3.2" fill="#00f7ff"><animateMotion path="M410,165 Q540,95 670,100" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle r="3.2" fill="#facc15"><animateMotion path="M670,100 Q540,140 410,165" dur="2s" repeatCount="indefinite"/></circle>
  <circle r="3.2" fill="#00f7ff"><animateMotion path="M410,165 Q540,215 670,230" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle r="3.2" fill="#facc15"><animateMotion path="M670,230 Q540,190 410,165" dur="2.2s" repeatCount="indefinite"/></circle>

  <!-- agent nodes with icons -->
  <g font-family="Consolas, monospace" font-size="11" fill="#e6edf3" text-anchor="middle">

    <!-- Research Agent (magnifying glass) -->
    <circle cx="150" cy="100" r="24" fill="url(#nodeGlow)"><animate attributeName="r" values="20;26;20" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="100" r="16" fill="#161b29" stroke="#a855f7" stroke-width="2"/>
    <g stroke="#e6edf3" stroke-width="1.4" fill="none" stroke-linecap="round">
      <circle cx="147" cy="97" r="4.2"/>
      <line x1="150.2" y1="100.2" x2="154" y2="104"/>
    </g>
    <text x="150" y="136">Research Agent</text>

    <!-- Tool Agent (wrench/gear) -->
    <circle cx="150" cy="230" r="24" fill="url(#nodeGlow)"><animate attributeName="r" values="20;26;20" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="230" r="16" fill="#161b29" stroke="#a855f7" stroke-width="2"/>
    <g stroke="#e6edf3" stroke-width="1.4" fill="none">
      <circle cx="150" cy="230" r="5"/>
      <circle cx="150" cy="230" r="1.6" fill="#e6edf3"/>
    </g>
    <text x="150" y="266">Tool Agent</text>

    <!-- Planning Agent (compass) -->
    <circle cx="670" cy="100" r="24" fill="url(#nodeGlow)"><animate attributeName="r" values="20;26;20" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="100" r="16" fill="#161b29" stroke="#a855f7" stroke-width="2"/>
    <path d="M670,93 L676,100 L670,107 L664,100 Z" stroke="#e6edf3" stroke-width="1.2" fill="none"/>
    <text x="670" y="136">Planning Agent</text>

    <!-- Memory Agent (database) -->
    <circle cx="670" cy="230" r="24" fill="url(#nodeGlow)"><animate attributeName="r" values="20;26;20" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="230" r="16" fill="#161b29" stroke="#a855f7" stroke-width="2"/>
    <g stroke="#e6edf3" stroke-width="1.2" fill="none">
      <ellipse cx="670" cy="225" rx="6.5" ry="2.4"/>
      <path d="M663.5,225 L663.5,233 A6.5,2.4 0 0 0 676.5,233 L676.5,225"/>
    </g>
    <text x="670" y="266">Memory Agent</text>
  </g>

  <!-- rotating processing ring around orchestrator -->
  <circle cx="410" cy="165" r="66" fill="none" stroke="#00f7ff" stroke-width="1.4" stroke-dasharray="3,7" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 410 165" to="360 410 165" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- central orchestrator box -->
  <rect x="322" y="141" width="176" height="48" rx="12" fill="#00f7ff" opacity="0.18" filter="url(#glow)">
    <animate attributeName="opacity" values="0.12;0.3;0.12" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="322" y="141" width="176" height="48" rx="12" fill="#161b29" stroke="#00f7ff" stroke-width="2.2"/>
  <text x="410" y="161" text-anchor="middle" font-family="Consolas, monospace" font-size="12.5" font-weight="bold" fill="#00f7ff">Rishit the Orchestrator</text>
  <text x="410" y="176" text-anchor="middle" font-family="Consolas, monospace" font-size="8.5" fill="#7d8590">routes · decides · delivers</text>

  <!-- legend -->
  <g font-family="Consolas, monospace" font-size="9" fill="#7d8590">
    <line x1="600" y1="260" x2="620" y2="260" stroke="#00f7ff" stroke-width="2"/>
    <text x="626" y="263">task</text>
    <line x1="670" y1="260" x2="690" y2="260" stroke="#facc15" stroke-width="2"/>
    <text x="696" y="263">result</text>
  </g>
</svg>
